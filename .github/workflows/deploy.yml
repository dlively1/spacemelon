name: Deploy to GitHub Pages

# Builds the production bundle and publishes it to GitHub Pages on every push
# to main. Can also be run on demand from the Actions tab.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow this workflow to publish a Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# One live deployment at a time; let an in-progress deploy finish so a Pages
# publish is never left half-applied.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Build
        # base_path comes from configure-pages (e.g. "/spacemelon/") so built
        # asset URLs resolve under the project-pages subpath.
        env:
          BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: pnpm build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
