version: 2
updates:
  # GitHub Actions used in .github/workflows/
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: ci
    groups:
      # One PR for all action bumps instead of one per action.
      github-actions:
        patterns:
          - "*"

  # npm / pnpm dependencies (Dependabot reads pnpm-lock.yaml under "npm").
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: deps
      prefix-development: deps-dev
    groups:
      # Bundle the low-risk minor/patch bumps into a single weekly PR so we
      # don't drown in noise. Major bumps stay as separate PRs for review.
      minor-and-patch:
        update-types:
          - minor
          - patch
