<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spacemelon</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #05030a;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: #f8e9ff;
        font-family: "Courier New", ui-monospace, monospace;
        overflow: hidden;
        height: 100%;
        width: 100%;
      }
      #game {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }
      #game canvas {
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        box-shadow: 0 0 80px rgba(140, 60, 220, 0.35);
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
